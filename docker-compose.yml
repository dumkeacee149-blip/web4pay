services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: web4pay
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d web4pay"]
      interval: 2s
      timeout: 3s
      retries: 30

  migrate:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/web4pay"
    volumes:
      - ./:/app
    command: >
      sh -lc "
        psql "$$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/migrations/0001_init.sql
      "
    restart: "no"

  api:
    image: node:22-alpine
    working_dir: /app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: "3000"
      API_KEYS: "dev-token-1"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/web4pay"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
      - api_pkg_node_modules:/app/apps/api/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -lc "
        corepack enable &&
        pnpm config set store-dir /pnpm/store &&
        pnpm -w install --unsafe-perm &&
        pnpm --filter @web4pay/api install --unsafe-perm &&
        pnpm --filter @web4pay/api dev
      "

  watcher:
    image: node:22-alpine
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/web4pay"
      WATCHER_POLL_MS: "3000"
      WATCHER_SETTLE_MS: "1500"
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
      - api_pkg_node_modules:/app/apps/api/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -lc "
        corepack enable &&
        while [ ! -x /app/apps/api/node_modules/.bin/tsx ] ; do sleep 1; done &&
        pnpm --filter @web4pay/api exec tsx src/watcher.ts
      "

volumes:
  db_data:
  api_node_modules:
  pnpm_store:
  api_pkg_node_modules:
